name: Daily Reminder Refresh

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call backend refresh endpoint
        env:
          BACKEND_URL: https://lc-remainder.onrender.com
        run: |
          curl --fail --show-error --silent --request POST "$BACKEND_URL/api/refresh"
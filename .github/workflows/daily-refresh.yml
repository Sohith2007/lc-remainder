name: Daily Reminder Refresh

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Force send even if already sent today"
        required: false
        default: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call backend refresh endpoint
        env:
          BACKEND_URL: https://lc-remainder.onrender.com
          FORCE_SEND: ${{ github.event.inputs.force_send || 'false' }}
        run: |
          RESPONSE=$(curl --fail --show-error --silent --request POST "$BACKEND_URL/api/refresh?force=$FORCE_SEND")
          echo "Refresh response: $RESPONSE"

          STATUS=$(echo "$RESPONSE" | jq -r '.status // ""')
          SENT_COUNT=$(echo "$RESPONSE" | jq -r '.sent_count // 0')

          if [ "$STATUS" = "success" ]; then
            echo "Emails sent: $SENT_COUNT"
            exit 0
          fi

          if [ "$STATUS" = "already_sent" ]; then
            echo "Skipped: already sent today. Re-run with force_send=true to send again."
            exit 0
          fi

          if [ "$STATUS" = "no_recipients" ]; then
            echo "No recipients configured in storage."
            exit 1
          fi

          echo "Refresh failed with status: $STATUS"
          exit 1
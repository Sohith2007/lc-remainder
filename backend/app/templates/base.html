<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ settings.app_name }}</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --panel-2: #1f2937;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #f59e0b;
        --link: #60a5fa;
      }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1e293b, var(--bg));
        color: var(--text);
      }
      .shell {
        max-width: 960px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      .hero {
        display: grid;
        gap: 16px;
        margin-bottom: 24px;
      }
      .title {
        font-size: clamp(2rem, 4vw, 3.5rem);
        margin: 0;
        letter-spacing: -0.03em;
      }
      .subtitle {
        color: var(--muted);
        margin: 0;
        max-width: 60ch;
      }
      .card {
        background: rgba(17, 24, 39, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.3);
      }
      .meta {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        color: var(--muted);
        margin-bottom: 16px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(245, 158, 11, 0.15);
        color: #fcd34d;
      }
      a {
        color: var(--link);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .problem-title {
        margin: 0 0 12px;
        font-size: clamp(1.5rem, 3vw, 2.25rem);
      }
      .description {
        white-space: pre-wrap;
        color: #d1d5db;
      }
      .empty {
        color: var(--muted);
      }
      .footer {
        margin-top: 20px;
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
